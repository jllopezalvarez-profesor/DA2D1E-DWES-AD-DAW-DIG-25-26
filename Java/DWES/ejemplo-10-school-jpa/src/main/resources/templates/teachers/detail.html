<!DOCTYPE html>
<html lang="es" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle de profesor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>

</head>
<body>
<div class="container">
    <div th:replace="~{fragments :: header}"></div>

    <h1 th:text="|${teacher.firstName} ${teacher.lastName}|">Nombre del profesor</h1>
    <p>Fecha de nacimiento:
        <th:block th:text="${teacher.birthDate}">YYYY-MM-DD</th:block>
    </p>
    <p>Fecha de incorporación: <span th:text="${teacher.startDate}" th:remove="tag">YYYY-MM-DD</span></p>

    <p>Email: <span th:text="${teacher.email}">correo@dondesea.org</span></p>
</div>

</body>
</html>
