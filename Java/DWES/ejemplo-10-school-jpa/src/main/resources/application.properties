spring.application.name=ejemplo-10-school-jpa

spring.datasource.url=jdbc:h2:mem:school-jpa;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.username=sa
spring.datasource.password=

#spring.h2.console.enabled

spring.jpa.show-sql=true
#spring.jpa.hibernate.ddl-auto=
spring.jpa.defer-datasource-initialization=true

#server.servlet.context-path=/prueba

# Configuración personalizada. Son valores específicos de la aplicación, que no
# forman parte de la configuración estándar de Spring u otros componentes.
# Se inyectan en componentes usando la anotación @Value.
shop.validation.client-validation-enabled=false
shop.security.bcrypt.cost.factor=12
