<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments :: head-metas}"></th:block>
    <title>Gestor de incidencias</title>
    <th:block th:replace="~{fragments :: head-styles}"></th:block>
</head>
<body>

<header th:replace="~{fragments :: header}"></header>

<div class="container-fluid">
    <div class="row">
        <nav th:replace="~{fragments :: sidebar-menu}"></nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Búsqueda de incidencias</h1>
            </div>


            <form method="get" th:action="@{/issues/search}" class="card p-4 mb-4 shadow-sm">
                <div class="row g-3">

                    <div class="col-md-6">
                        <label for="text" class="form-label">Texto (título o descripción)</label>
                        <input type="text" id="text" name="text" class="form-control"
                               th:value="${text}" placeholder="Buscar..."/>
                    </div>

                    <div class="col-md-3">
                        <label for="status" class="form-label">Estado</label>
                        <select id="status" name="status" class="form-select">
                            <option value="">-- Todos --</option>
                            <option th:each="s : ${issueStatuses}"
                                    th:value="${s}"
                                    th:text="${s}"
                                    th:selected="${s.name() == status}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label for="project-id" class="form-label">Proyecto</label>
                        <select id="project-id" name="projectId" class="form-select">
                            <option value="">-- Todos --</option>
                            <option th:each="p : ${projects}"
                                    th:value="${p.projectId}"
                                    th:text="${p.name}"
                                    th:selected="${p.projectId == projectId}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label for="assignee-id" class="form-label">Assignee</label>
                        <select id="assignee-id" name="assigneeId" class="form-select">
                            <option value="">-- Todos --</option>
                            <option th:each="u : ${users}"
                                    th:value="${u.userId}"
                                    th:text="${u.getFullName()}"
                                    th:selected="${u.userId == assigneeId}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label for="created-from" class="form-label">Creado desde</label>
                        <input type="date" id="created-from" name="createdFrom" class="form-control"
                               th:value="${createdFrom}"/>
                    </div>

                    <div class="col-md-3">
                        <label for="created-to" class="form-label">Creado hasta</label>
                        <input type="date" id="created-to" name="createdTo" class="form-control"
                               th:value="${createdTo}"/>
                    </div>

                    <div class="col-md-3">
                        <label for="sort-by" class="form-label">Ordenar por</label>
                        <select name="sortBy" id="sort-by" class="form-select">
                            <option th:each="opt : ${sortFields}"
                                    th:value="${opt.value()}"
                                    th:text="${opt.text()}"
                                    th:selected="${opt.value() == sortBy}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <label for="sort-dir" class="form-label">Dirección</label>
                        <select id="sort-dir" name="sortDir" class="form-select">
                            <option th:each="opt : ${sortDirection}"
                                    th:value="${opt.value()}"
                                    th:text="${opt.text()}"
                                    th:selected="${opt.value() == sortDir}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-1">
                        <label for="size" class="form-label">Por página</label>
                        <select name="size" id="size" class="form-select">
                            <option th:each="s : ${pageSizes}"
                                    th:value="${s}"
                                    th:text="${s}"
                                    th:selected="${s == size}">
                            </option>
                        </select>
                    </div>

                    <input type="hidden" name="page" value="0"/>

                </div>

                <div class="mt-3 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Buscar</button>
                    <a th:href="@{/issues/search}" class="btn btn-outline-secondary">Volver a empezar</a>
                </div>

            </form>

            <!-- Resultados -->
            <div th:if="${results != null}">

                <p class="text-muted">Total de resultados: <strong th:text="${totalPages > 0 ? results.size() : 0}"></strong></p>

                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle shadow-sm">
                        <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Título</th>
                            <th>Estado</th>
                            <th>Proyecto</th>
                            <th>Assignee</th>
                            <th>Creado</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(results)}">
                            <td colspan="6" class="text-center text-muted">No se encontraron resultados.</td>
                        </tr>
                        <tr th:each="issue : ${results}">
                            <td th:text="${issue.issueId}"></td>
                            <td th:text="${issue.title}"></td>
                            <td>
                            <span class="badge"
                                  th:text="${issue.status}"
                                  th:classappend="${issue.status.name() == 'OPEN'} ? 'bg-success' :
                                                 (${issue.status.name() == 'CLOSED'} ? 'bg-secondary' : 'bg-warning text-dark')">
                            </span>
                            </td>
                            <td th:text="${issue.project.name}"></td>
                            <td th:text="${issue.assignee?.fullName ?: '-'}"></td>
                            <td th:text="${#temporals.format(issue.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Paginación -->
                <nav th:if="${totalPages > 1}">
                    <ul class="pagination justify-content-center">

                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link" th:href="@{/issues/search(
                        text=${text}, status=${status},
                        projectId=${projectId}, assigneeId=${assigneeId},
                        createdFrom=${createdFrom}, createdTo=${createdTo},
                        sortBy=${sortBy}, sortDir=${sortDir},
                        size=${size}, page=${currentPage - 1})}">Anterior</a>
                        </li>

                        <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                            th:classappend="${i == currentPage} ? 'active'">
                            <a class="page-link" th:text="${i + 1}"
                               th:href="@{/issues/search(
                        text=${text}, status=${status},
                        projectId=${projectId}, assigneeId=${assigneeId},
                        createdFrom=${createdFrom}, createdTo=${createdTo},
                        sortBy=${sortBy}, sortDir=${sortDir},
                        size=${size}, page=${i})}">
                            </a>
                        </li>

                        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/issues/search(
                        text=${text}, status=${status},
                        projectId=${projectId}, assigneeId=${assigneeId},
                        createdFrom=${createdFrom}, createdTo=${createdTo},
                        sortBy=${sortBy}, sortDir=${sortDir},
                        size=${size}, page=${currentPage + 1})}">Siguiente</a>
                        </li>

                    </ul>
                </nav>

            </div>
        </main>
    </div>
</div>

<th:block th:replace="~{fragments :: bottom-scripts}"></th:block>

</body>
</html>
