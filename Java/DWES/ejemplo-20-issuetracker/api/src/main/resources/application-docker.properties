# Configuracin para PostgreSQL (Docker)
spring.datasource.url=jdbc:postgresql://db:5432/issuetracker
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# En PostgreSQL no solemos usar la consola de H2
spring.h2.console.enabled=false
spring.jpa.show-sql=false
# Hibernate validar que las tablas existan y coincidan con las entidades
spring.jpa.hibernate.ddl-auto=validate
# Si quieres ejecutar scripts SQL al inicio (data.sql), descomenta esto:
# spring.sql.init.mode=always
