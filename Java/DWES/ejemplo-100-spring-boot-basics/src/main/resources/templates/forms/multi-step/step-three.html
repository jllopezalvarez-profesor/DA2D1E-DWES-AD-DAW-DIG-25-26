<!DOCTYPE html>
<html lang="es" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/fragments :: head('Formulario multipaso - Paso 3')}">
    <title>Formulario multipaso - Paso 3</title>
</head>
<body>
<div class="container">
    <header th:replace="~{fragments/fragments :: header}"></header>
    <div class="container">
        <h2>Formulario multipaso - Paso 3 - Seguridad y preferencias</h2>

        <form th:action="@{/forms/multi-step/step-three}" th:object="${dto}" method="post" novalidate>

            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" id="password" class="form-control"
                       th:field="*{password}"
                       th:errorclass="is-invalid">
                <div class="invalid-feedback" th:errors="*{password}"></div>
            </div>

            <div class="mb-3">
                <label for="confirm-password" class="form-label">Confirmar contraseña</label>
                <input type="password" id="confirm-password" class="form-control"
                       th:field="*{confirmPassword}"
                       th:errorclass="is-invalid">
                <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
            </div>

            <div class="mb-3">
                <label for="city" class="form-label">Ciudad</label>
                <input type="text" id="city" class="form-control"
                       th:field="*{city}"
                       th:errorclass="is-invalid">
                <div class="invalid-feedback" th:errors="*{city}"></div>
            </div>

            <div class="form-check mb-3">
                <input type="checkbox" id="accept-terms" class="form-check-input"
                       th:field="*{acceptsTermsOfUse}"
                       th:errorclass="is-invalid">
                <label for="accept-terms" class="form-check-label">
                    Acepto los términos de uso
                </label>
                <div class="invalid-feedback" th:errors="*{acceptsTermsOfUse}"></div>
            </div>

            <div class="d-flex justify-content-between">
                <a th:href="@{/forms/multi-step/step-two}" class="btn btn-secondary">Atrás</a>
                <button class="btn btn-success">Finalizar</button>
            </div>

        </form>

    </div>

</div>


</body>
</html>
